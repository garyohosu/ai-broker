name: Daily Article Generation

on:
  schedule:
    - cron: "30 7 * * 1-5"  # 平日 16:30 JST (= 07:30 UTC)
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily job
        run: python3 scripts/run_daily.py
        # OPENAI_API_KEY 未設定 → CLI フォールバック → ハードコードコメント
        # yfinance で実際の市場データは取得するため記事は毎日更新される

      - name: Commit & Push
        run: |
          git config user.name "ai-broker-bot"
          git config user.email "ai-broker-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%F)"
          git push
